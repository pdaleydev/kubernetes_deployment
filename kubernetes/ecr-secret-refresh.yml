apiVersion: v1
kind: ServiceAccount
metadata:
  name: ecr-secret-refresher
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ecr-secret-refresher
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "delete", "get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ecr-secret-refresher
  namespace: default
subjects:
  - kind: ServiceAccount
    name: ecr-secret-refresher
    namespace: default
roleRef:
  kind: Role
  name: ecr-secret-refresher
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ecr-secret-refresh
  namespace: default
spec:
  schedule: "0 */6 * * *"  # every 6 hours, well within the 12hr expiry
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: ecr-secret-refresher
          restartPolicy: Never
          containers:
            - name: ecr-secret-refresh
              image: amazon/aws-cli
              env:
                - name: AWS_REGION
                  value: us-east-2
              command:
                - /bin/sh
                - -c
                - |
                  ECR_TOKEN=$(aws ecr get-login-password --region $AWS_REGION)
                  kubectl delete secret ecr-secret --ignore-not-found
                  kubectl create secret docker-registry ecr-secret \
                    --docker-server=478067375307.dkr.ecr.us-east-2.amazonaws.com \
                    --docker-username=AWS \
                    --docker-password=$ECR_TOKEN