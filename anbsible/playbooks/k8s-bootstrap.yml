# ==============================================================================
# PLAY 0: Configure containerd on All Nodes
# ==============================================================================
- name: Configure containerd on all nodes
  hosts: role_control_plane:role_worker
  become: yes
  vars:
    ansible_user: ubuntu
  tasks:
    - name: Wait for apt lock to be released
      shell: while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do sleep 5; done
      changed_when: false

    - name: Ensure containerd config directory exists
      file:
        path: /etc/containerd
        state: directory
        mode: '0755'

    - name: Generate and write default containerd config
      shell: containerd config default > /etc/containerd/config.toml
      args:
        creates: /etc/containerd/config.toml

    - name: Set SystemdCgroup to true
      replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'
      notify: restart containerd

  handlers:
    - name: restart containerd
      systemd:
        name: containerd
        state: restarted
        daemon_reload: yes

# ==============================================================================
# PLAY 1: Initialize the Control Plane
# ==============================================================================
- name: Bootstrap Kubernetes Control Plane
  hosts: role_control_plane
  become: yes
  vars:
    ansible_user: ubuntu
  tasks:
    - name: Initialize the Kubernetes cluster
      command: >
        /usr/bin/kubeadm init
        --node-name {{ inventory_hostname }}
      args:
        creates: /etc/kubernetes/admin.conf

    - name: Create .kube directory for user
      file:
        path: "/home/{{ ansible_user }}/.kube"
        state: directory
        mode: '0755'
        owner: "{{ ansible_user }}"

    - name: Copy admin.conf to user's kube config
      copy:
        src: /etc/kubernetes/admin.conf
        dest: "/home/{{ ansible_user }}/.kube/config"
        remote_src: yes
        owner: "{{ ansible_user }}"

    - name: Install Calico Network Plugin
      command: kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.26.1/manifests/calico.yaml
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: cni_result
      until: cni_result is succeeded
      retries: 3

    - name: Get the join command for workers
      command: kubeadm token create --print-join-command
      register: join_command_raw
      changed_when: false

    - name: Share join command with other plays
      set_fact:
        kubernetes_join_command: "{{ join_command_raw.stdout }}"
      delegate_to: "{{ item }}"
      delegate_facts: true
      with_items: "{{ groups['role_worker'] }}"

    - name: Fetch kubeconfig to on-prem device
      fetch:
        src: /etc/kubernetes/admin.conf
        dest: ~/.kube/config-aws-cluster
        flat: yes

# ==============================================================================
# PLAY 2: Join the Worker Nodes
# ==============================================================================
- name: Join Worker Nodes to the Cluster
  hosts: role_worker
  become: yes
  vars:
    ansible_user: ubuntu
  tasks:
    - name: Join the cluster
      command: "{{ kubernetes_join_command }}"
      args:
        creates: /etc/kubernetes/kubelet.conf

# ==============================================================================
# PLAY 3: Bootstrap ECR Secret and Apply Kubernetes Manifests
# ==============================================================================
- name: Bootstrap ECR credentials and deploy manifests
  hosts: localhost
  become: no
  tags: bootstrap
  vars:
    ecr_region: us-east-2
    ecr_account_id: "478067375307"
    kubeconfig_path: "{{ lookup('env', 'HOME') }}/.kube/config-aws-cluster"
    manifests_dir: "{{ lookup('env', 'HOME') }}/kubernetes"
  tasks:
    - name: Wait for kubeconfig file to exist
      wait_for:
        path: "{{ kubeconfig_path }}"
        state: present
        timeout: 60

    - name: Wait for Kubernetes API to be reachable
      command: kubectl --kubeconfig={{ kubeconfig_path }} get nodes
      register: api_ready
      until: api_ready is succeeded
      retries: 10
      delay: 15

    - name: Get ECR login token
      command: aws ecr get-login-password --region {{ ecr_region }}
      register: ecr_token
      changed_when: false
      no_log: true

    - name: Create ECR image pull secret
      command: >
        kubectl --kubeconfig={{ kubeconfig_path }}
        create secret docker-registry ecr-secret
        --docker-server={{ ecr_account_id }}.dkr.ecr.{{ ecr_region }}.amazonaws.com
        --docker-username=AWS
        --docker-password={{ ecr_token.stdout }}
        --dry-run=client -o yaml
      register: ecr_secret_yaml
      changed_when: false
      no_log: true

    - name: Apply ECR secret
      shell: >
        echo '{{ ecr_secret_yaml.stdout }}' |
        kubectl --kubeconfig={{ kubeconfig_path }} apply -f -
      no_log: true

    - name: Apply ECR secret refresh CronJob
      command: >
        kubectl --kubeconfig={{ kubeconfig_path }}
        apply -f {{ manifests_dir }}/ecr-secret-refresh.yml

    - name: Apply application deployment
      command: >
        kubectl --kubeconfig={{ kubeconfig_path }}
        apply -f {{ manifests_dir }}/deployment.yml

    - name: Wait for deployment to roll out
      command: >
        kubectl --kubeconfig={{ kubeconfig_path }}
        rollout status deployment/receipt-corrector --timeout=120s