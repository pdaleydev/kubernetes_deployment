apiVersion: apps/v1
kind: Deployment
metadata:
  name: receipt-corrector
spec:
  replicas: 2
  selector:
    matchLabels:
      app: receipt-corrector
  template:
    metadata:
      labels:
        app: receipt-corrector
    spec:
      imagePullSecrets:
        - name: ecr-secret
      containers:
        - name: receipt-corrector
          image: 478067375307.dkr.ecr.us-east-2.amazonaws.com/receipt_corrector:v1.0
          ports:
            - containerPort: 5000