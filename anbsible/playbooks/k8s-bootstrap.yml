---
# ==============================================================================
# PLAY 0: Configure containerd and ECR Credential Helper on All Nodes
# ==============================================================================
- name: Configure containerd and ECR Credential Helper
  hosts: role_control_plane:role_worker
  become: yes
  vars:
    ansible_user: ubuntu
  tasks:
    - name: Install ECR credential helper
      apt:
        name: amazon-ecr-credential-helper
        state: present
        update_cache: yes

    - name: Ensure containerd config directory exists
      file:
        path: /etc/containerd
        state: directory
        mode: '0755'

    - name: Generate and write default containerd config
      shell: containerd config default > /etc/containerd/config.toml
      args:
        creates: /etc/containerd/config.toml

    - name: Set SystemdCgroup to true
      replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'
      notify: restart containerd

    - name: Ensure credential helper binary is in PATH for containerd
      file:
        src: /usr/bin/docker-credential-ecr-login
        dest: /usr/local/bin/docker-credential-ecr-login
        state: link
        force: yes

    - name: Create ECR registry hosts directory
      file:
        path: /etc/containerd/certs.d/478067375307.dkr.ecr.us-east-2.amazonaws.com
        state: directory
        mode: '0755'

    - name: Write ECR hosts.toml for containerd
      copy:
        dest: /etc/containerd/certs.d/478067375307.dkr.ecr.us-east-2.amazonaws.com/hosts.toml
        content: |
          server = "https://478067375307.dkr.ecr.us-east-2.amazonaws.com"

          [host."https://478067375307.dkr.ecr.us-east-2.amazonaws.com"]
            capabilities = ["pull", "resolve"]
      notify: restart containerd

  handlers:
    - name: restart containerd
      systemd:
        name: containerd
        state: restarted
        daemon_reload: yes
        
# ==============================================================================
# PLAY 1: Initialize the Control Plane
# ==============================================================================
- name: Bootstrap Kubernetes Control Plane
  hosts: role_control_plane
  become: yes
  vars:
    ansible_user: ubuntu  # Hardcoded for your AWS nodes
  tasks:
    - name: Initialize the Kubernetes cluster
      command: >
        /usr/bin/kubeadm init
        --node-name {{ inventory_hostname }}
      args:
        creates: /etc/kubernetes/admin.conf

    - name: Create .kube directory for user
      file:
        path: "/home/{{ ansible_user }}/.kube"
        state: directory
        mode: '0755'
        owner: "{{ ansible_user }}"

    - name: Copy admin.conf to user's kube config
      copy:
        src: /etc/kubernetes/admin.conf
        dest: "/home/{{ ansible_user }}/.kube/config"
        remote_src: yes
        owner: "{{ ansible_user }}"

    - name: Install Calico Network Plugin
      command: kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.26.1/manifests/calico.yaml
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: cni_result
      until: cni_result is succeeded
      retries: 3

    - name: Get the join command for workers
      command: kubeadm token create --print-join-command
      register: join_command_raw
      changed_when: false

    - name: Share join command with other plays
      set_fact:
        kubernetes_join_command: "{{ join_command_raw.stdout }}"
      delegate_to: "{{ item }}"
      delegate_facts: true
      with_items: "{{ groups['role_worker'] }}"

    - name: Fetch kubeconfig to on-prem device
      fetch:
        src: /etc/kubernetes/admin.conf
        dest: ~/.kube/config-aws-cluster
        flat: yes

# ==============================================================================
# PLAY 2: Join the Worker Nodes
# ==============================================================================
- name: Join Worker Nodes to the Cluster
  hosts: role_worker
  become: yes
  vars:
    ansible_user: ubuntu  # Hardcoded for your AWS nodes
  tasks:
    - name: Join the cluster
      command: "{{ kubernetes_join_command }}"
      args:
        creates: /etc/kubernetes/kubelet.conf